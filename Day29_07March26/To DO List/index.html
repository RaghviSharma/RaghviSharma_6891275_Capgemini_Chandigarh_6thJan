<!DOCTYPE html>
<html>
<head>
<title>To-Do List App</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(120deg,#84fab0,#8fd3f4);
    text-align:center;
}

.container{
    width:400px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:65%;
    border:1px solid gray;
    border-radius:5px;
}

button{
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.add{
    background:#4CAF50;
    color:white;
}

.reset{
    background:#f44336;
    color:white;
    margin-top:10px;
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    padding:10px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
    transition:0.3s;
}

li:hover{
    background:#f1f1f1;
}

.done{
    text-decoration:line-through;
    color:gray;
}

</style>

</head>

<body>

<div class="container">

<h2>My To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter a task">
<button class="add" onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<button class="reset" onclick="clearTasks()">Clear All</button>

</div>

<script>

function addTask(){

    let input=document.getElementById("taskInput");
    let task=input.value;

    if(task==="") return;

    let li=document.createElement("li");
    li.textContent=task;

    li.onclick=function(){
        li.classList.toggle("done");
    }

    document.getElementById("taskList").appendChild(li);

    input.value="";
}

function clearTasks(){
    document.getElementById("taskList").innerHTML="";
}

</script>

</body>
</html>
