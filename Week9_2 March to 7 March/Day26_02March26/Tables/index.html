<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Styled Data Table</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        padding: 30px;
    }

    table{
        width: 70%;
        margin: auto;
        border-collapse: collapse;   /* Removes double borders */
        background-color: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    caption{
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    th, td{
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
    }

    th{
        background-color: #2c3e50;
        color: white;
    }

    /* Alternate row colors */
    tr:nth-child(even){
        background-color: #f2f2f2;
    }

    /* Hover effect */
    tr:hover{
        background-color: #d6eaf8;
        cursor: pointer;
    }
</style>

</head>
<body>

<table>
    <caption>Student Grade Report</caption>

    <tr>
        <th>User ID</th>
        <th>Name</th>
        <th>Designation</th>
        <th>Salary</th>
        <th>Location</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Raghvi</td>
        <td>Developer</td>
        <td>8500000</td>
        <td>Pune</td>
    </tr>

    <tr>
        <td>102</td>
        <td>Riya</td>
        <td>Marketing</td>
        <td>850000</td>
        <td>Hyderabad</td>
    </tr>

    <tr>
        <td>103</td>
        <td>Aryan</td>
        <td>Engineer</td>

        <td>Gurgaon</td>
    </tr>

    <tr>
        <td>104</td>
        <td>Neha</td>

    </tr>

    <tr>
        <td>105</td>

    </tr>

</table>

</body>
</html>
