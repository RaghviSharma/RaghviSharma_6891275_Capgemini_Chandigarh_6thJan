<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup → Login → Success</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
}

/* Section layout */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    background: white;
    padding: 35px;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

/* Labels */
label {
    display: block;
    text-align: left;
    font-weight: bold;
    margin-top: 10px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus {
    border-color: #2575fc;
    outline: none;
    box-shadow: 0 0 8px rgba(37,117,252,0.4);
}

/* Button-style links */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    background: #2575fc;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 16px;
}

.btn:hover {
    background: #1b5edb;
}

/* Success text */
.success {
    color: green;
    font-size: 24px;
    font-weight: bold;
}
</style>

</head>
<body>

<!-- 🔷 SIGNUP PAGE -->
<div class="section" id="signup">
    <div class="card">
        <h2>Signup</h2>

        <label>Username</label>
        <input type="text" placeholder="Enter username">

        <label>Email</label>
        <input type="email" placeholder="Enter email">

        <label>Password</label>
        <input type="password" placeholder="Create password">

        <a href="#login" class="btn">Sign Up</a>
    </div>
</div>

<!-- 🔷 LOGIN PAGE -->
<div class="section" id="login">
    <div class="card">
        <h2>Login</h2>

        <label>Username</label>
        <input type="text" placeholder="Enter username">

        <label>Password</label>
        <input type="password" placeholder="Enter password">

        <a href="#success" class="btn">Login</a>
    </div>
</div>

<!-- 🔷 SUCCESS PAGE -->
<div class="section" id="success">
    <div class="card">
        <h2 class="success">🎉 Login Successful!</h2>
        <p>Welcome to your account.</p>

        <a href="#signup" class="btn">Back to Signup</a>
    </div>
</div>

</body>
</html>
